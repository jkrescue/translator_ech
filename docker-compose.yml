version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # ports:
    #   - "8000:8000"  # 已通过 Nginx 代理，不再直接暴露
    environment:
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_BASE_URL=https://api.siliconflow.cn/v1
      - OCR_MODEL=PaddlePaddle/PaddleOCR-VL-1.5
      - TRANSLATION_MODEL=Qwen/Qwen3-8B
      - DATABASE_URL=sqlite:///./pdf_translator.db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
      - pdf_uploads:/tmp/pdf_translator/uploads
      - pdf_outputs:/tmp/pdf_translator/outputs
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # ports:
    #   - "5173:5173"  # 已通过 Nginx 代理，不再直接暴露
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery worker --loglevel=info
    environment:
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - redis

volumes:
  pdf_uploads:
  pdf_outputs:
